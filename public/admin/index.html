<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理</title>
  <style>
    :root {
      --bg: #fef9f4;
      --card: #fff;
      --border: #f0e4da;
      --text: #3d2c2c;
      --text2: #8b6f6f;
      --accent: #f0846c;
      --accent-h: #e06850;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    input, textarea, select, button { font-family: inherit; }

    /* ===== Login ===== */
    #login-screen {
      max-width: 420px;
      margin: 120px auto;
      padding: 40px 32px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
      text-align: center;
    }
    #login-screen h1 { font-size: 1.5rem; margin-bottom: 6px; }
    #login-screen p { color: var(--text2); font-size: 0.9rem; margin-bottom: 24px; }
    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.2s;
    }
    #login-screen input:focus { border-color: var(--accent); }
    #login-screen .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #login-screen .btn:hover { background: var(--accent-h); }
    #login-screen .hint { font-size: 0.8rem; color: var(--text2); margin-top: 12px; }
    #login-screen .hint a { color: var(--accent); }

    /* ===== App ===== */
    #app { display: none; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .topbar h2 { font-size: 1.1rem; }
    .topbar-actions { display: flex; gap: 8px; }
    .topbar-actions button {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .topbar-actions button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .topbar-actions .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .topbar-actions .btn-primary:hover {
      background: var(--accent-h);
      color: #fff;
    }

    /* ===== Dashboard ===== */
    .dashboard { display: flex; min-height: calc(100vh - 60px); }
    .sidebar {
      width: 260px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      flex-shrink: 0;
    }
    .sidebar-section { padding: 8px 0; }
    .sidebar-section h3 {
      padding: 6px 20px;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text2);
      letter-spacing: 0.5px;
    }
    .sidebar-item {
      padding: 8px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: var(--bg); }
    .sidebar-item.active {
      background: var(--bg);
      border-left-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .sidebar-item .badge {
      font-size: 0.75rem;
      color: var(--text2);
    }

    /* ===== Editor ===== */
    .editor {
      flex: 1;
      padding: 24px;
      display: none;
      flex-direction: column;
      max-width: 900px;
    }
    .editor.active { display: flex; }
    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .editor-header .title-input {
      font-size: 1.3rem;
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      padding: 4px 0;
      flex: 1;
      min-width: 200px;
    }
    .editor-header .title-input::placeholder { color: var(--text2); opacity: 0.5; }
    .editor-actions { display: flex; gap: 8px; }
    .editor-actions button {
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .editor-actions button:hover { border-color: var(--accent); }
    .editor-actions .btn-save {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .editor-actions .btn-save:hover { background: var(--accent-h); }
    .editor-actions .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== Meta fields ===== */
    .meta-fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
      padding: 16px;
      background: var(--card);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .meta-field { display: flex; flex-direction: column; gap: 4px; }
    .meta-field label {
      font-size: 0.78rem;
      color: var(--text2);
      font-weight: 600;
    }
    .meta-field input, .meta-field select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      background: var(--bg);
    }
    .meta-field input:focus, .meta-field select:focus { border-color: var(--accent); }

    /* ===== Content textarea ===== */
    .content-wrap {
      flex: 1;
      display: flex;
      gap: 16px;
      min-height: 400px;
    }
    .content-wrap textarea {
      flex: 1;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.92rem;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      background: var(--card);
      color: var(--text);
      font-family: 'Fira Code', 'Consolas', monospace;
      min-height: 400px;
    }
    .content-wrap textarea:focus { border-color: var(--accent); }

    /* ===== Preview ===== */
    .content-wrap .preview {
      flex: 1;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      overflow-y: auto;
      line-height: 1.8;
      font-size: 0.92rem;
    }
    .content-wrap .preview h1 { font-size: 1.4rem; margin: 0.8em 0 0.3em; }
    .content-wrap .preview h2 { font-size: 1.2rem; margin: 0.8em 0 0.3em; }
    .content-wrap .preview code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .content-wrap .preview pre code { background: none; padding: 0; }
    .content-wrap .preview blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text2);
      margin: 0.5em 0;
    }

    /* ===== Status ===== */
    #status {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      z-index: 999;
    }
    #status.success { display: block; background: #d4edda; color: #155724; }
    #status.error { display: block; background: #f8d7da; color: #721c24; }
    #status.loading { display: block; background: #cce5ff; color: #004085; }

    /* ===== Empty ===== */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      gap: 8px;
    }
    .empty-state h3 { font-size: 1.2rem; }
    .empty-state p { font-size: 0.9rem; }

    /* ===== Loading ===== */
    .loading { text-align: center; padding: 40px; color: var(--text2); }
  </style>
</head>
<body>

  <!-- ===== Login Screen ===== -->
  <div id="login-screen">
    <h1>登录后台</h1>
    <input type="text" id="login-user" placeholder="用户名" autocomplete="username" />
    <input type="password" id="login-pass" placeholder="密码" autocomplete="current-password" />
    <p id="login-error" style="color:#d32f2f;display:none;margin-bottom:12px;font-size:0.85rem;"></p>
    <button class="btn" onclick="login()">登录</button>
    <div class="hint">默认账号: admin / 密码: admin123</div>
  </div>

  <!-- ===== Admin App ===== -->
  <div id="app">
    <div class="topbar">
      <h2>📝 后台管理</h2>
      <div class="topbar-actions">
        <button onclick="newDiary()">+ 写日记</button>
        <button onclick="newGallery()">+ 新建相册</button>
        <button onclick="deleteFile()" id="btn-delete" style="color:#d32f2f;border-color:#d32f2f;display:none;">删除</button>
        <button onclick="unhideAll()" id="btn-unhide" style="display:none;">恢复隐藏</button>
        <button onclick="logout()">退出</button>
      </div>
    </div>
    <div class="dashboard">
      <div class="sidebar" id="sidebar"></div>
      <div class="editor" id="editor"></div>
      <div class="empty-state" id="empty-state">
        <h3>欢迎回来 👋</h3>
        <p>从左侧选择一篇文章编辑，或点击「写日记」新建</p>
      </div>
    </div>
  </div>

  <div id="status"></div>

  <script>
    const REPO = 'Mr-Lu-06/blog';
    const BRANCH = 'main';

    // ===== 登录密码（在这里修改）=====
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123';

    var token = localStorage.getItem('gh_token') || '';
    var files = [];
    var currentFile = null;

    // ===== Auth =====
    if (localStorage.getItem('admin_logged_in') && token) { showApp(); loadFiles(); }

    function login() {
      var u = document.getElementById('login-user').value.trim();
      var p = document.getElementById('login-pass').value.trim();
      var err = document.getElementById('login-error');

      if (u !== ADMIN_USER || p !== ADMIN_PASS) {
        err.textContent = '用户名或密码错误';
        err.style.display = 'block';
        return;
      }

      token = localStorage.getItem('gh_token');
      if (!token) {
        token = prompt('首次使用需要 GitHub Token：\n\n1. 打开 https://github.com/settings/tokens/new?scopes=repo&description=blog-admin\n2. 拉到页面底部点击「Generate token」\n3. 复制 token 粘贴到此处\n\n（仅需设置一次，之后自动记住）');
        if (!token) return;
        localStorage.setItem('gh_token', token);
      }

      localStorage.setItem('admin_logged_in', '1');
      showApp();
      loadFiles();
    }

    function logout() {
      localStorage.removeItem('admin_logged_in');
      location.reload();
    }

    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    // ===== GitHub API =====
    var lastRequest = 0;
    async function gh(path, method = 'GET', body = null, retry = 0) {
      // 请求限速：最少间隔 200ms，避免触达 GitHub 次级频率限制
      var now = Date.now();
      if (now - lastRequest < 200) {
        await new Promise(r => setTimeout(r, 200 - (now - lastRequest)));
      }
      lastRequest = Date.now();

      const opts = {
        method,
        headers: {
          Authorization: 'Bearer ' + token,
          Accept: 'application/vnd.github.v3+json',
        },
      };
      if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const url = 'https://api.github.com/repos/' + REPO + path;
      const res = await fetch(url, opts);
      if (!res.ok) {
        // 403/429 限流：等待后重试（最多 3 次）
        if ((res.status === 403 || res.status === 429) && retry < 3) {
          var wait = 3000 * (retry + 1);
          showStatus('API 限流，' + (wait/1000) + '秒后重试...', 'loading');
          await new Promise(r => setTimeout(r, wait));
          return gh(path, method, body, retry + 1);
        }
        const errText = await res.text().catch(() => '');
        var err = new Error(res.status + ': ' + (errText.length > 100 ? errText.substring(0, 100) : errText));
        err.status = res.status;
        throw err;
      }
      return method === 'GET' ? res.json() : res;
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
      clearTimeout(el._timer);
      if (type !== 'loading') el._timer = setTimeout(() => el.style.display = 'none', 3000);
    }

    // ===== Load Files =====
    async function safeGh(path) {
      try { return await gh(path); }
      catch (e) { if (e.status === 404) return []; else throw e; }
    }

    async function loadFiles() {
      showStatus('加载中...', 'loading');
      try {
        const diaryFiles = await safeGh('/contents/src/content/diary');
        const galleryFiles = await safeGh('/contents/src/content/gallery');

        files = [
          ...(Array.isArray(diaryFiles) ? diaryFiles.map(f => ({ ...f, _type: 'diary' })) : []),
          ...(Array.isArray(galleryFiles) ? galleryFiles.map(f => ({ ...f, _type: 'gallery' })) : []),
        ];

        // 过滤已隐藏的文件
        var hidden = JSON.parse(localStorage.getItem('hidden_files') || '[]');
        files = files.filter(function(f) { return hidden.indexOf(f.path) === -1; });

        renderSidebar();
        showStatus('加载完成', 'success');
      } catch (e) {
        var msg = e.message;
        if (e.status === 401) {
          localStorage.removeItem('gh_token');
          localStorage.removeItem('admin_logged_in');
          token = '';
          alert('GitHub Token 无效，请重新设置。\n\n1. 打开 https://github.com/settings/tokens/new?scopes=repo&description=blog-admin\n2. 生成新 Token 后重新登录');
          location.reload();
          return;
        }
        showStatus('加载失败: ' + msg, 'error');
      }
    }

    // ===== Render Sidebar =====
    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      const diaries = files.filter(f => f._type === 'diary');
      const galleries = files.filter(f => f._type === 'gallery');

      let html = '';
      html += '<div class="sidebar-section"><h3>日记</h3>';
      diaries.forEach(f => {
        const name = f.name.replace(/\.md$/, '').replace(/\d{4}-\d{2}-\d{2}-/, '');
        const active = currentFile && currentFile.path === f.path ? 'active' : '';
        html += '<div class="sidebar-item ' + active + '" onclick="openFile(\'' + f.path + '\')">' +
          '<span>' + escapeHtml(name) + '</span></div>';
      });
      if (!diaries.length) html += '<div class="sidebar-item" style="color:var(--text2);font-style:italic;">暂无日记</div>';

      html += '</div><div class="sidebar-section"><h3>相册</h3>';
      galleries.forEach(f => {
        const name = f.name.replace(/\.md$/, '');
        const active = currentFile && currentFile.path === f.path ? 'active' : '';
        html += '<div class="sidebar-item ' + active + '" onclick="openFile(\'' + f.path + '\')">' +
          '<span>' + escapeHtml(name) + '</span></div>';
      });
      if (!galleries.length) html += '<div class="sidebar-item" style="color:var(--text2);font-style:italic;">暂无相册</div>';

      html += '</div>';
      sidebar.innerHTML = html;
    }

    // ===== Open File =====
    let allFilesCache = {};

    async function openFile(path) {
      showStatus('加载中...', 'loading');
      try {
        if (!allFilesCache[path]) {
          const data = await gh('/contents/' + path);
          allFilesCache[path] = data;
        }
        const data = allFilesCache[path];
        const content = decodeURIComponent(escape(atob(data.content)));
        currentFile = { ...data, _content: content, path };
        renderEditor(content, path);
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('btn-delete').style.display = 'inline-block';
        renderSidebar();
        showStatus('已加载', 'success');
      } catch (e) {
        if (e.status === 404) {
          var hidden = JSON.parse(localStorage.getItem('hidden_files') || '[]');
          if (hidden.indexOf(path) === -1) { hidden.push(path); }
          localStorage.setItem('hidden_files', JSON.stringify(hidden));
          delete allFilesCache[path];
          showStatus('文件已不存在，已自动隐藏', 'success');
          loadFiles();
          return;
        }
        showStatus('打开失败: ' + e.message, 'error');
      }
    }

    // ===== Parse & Render Editor =====
    function parseFrontmatter(content) {
      const match = content.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
      if (!match) return { data: {}, body: content };
      const yaml = match[1];
      const body = match[2];
      const data = {};
      yaml.split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx > 0) {
          let key = line.substring(0, idx).trim();
          let val = line.substring(idx + 1).trim();
          if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
          if (val.startsWith('[') && val.endsWith(']')) {
            try { val = JSON.parse(val); } catch {}
          }
          data[key] = val;
        }
      });
      return { data, body: body.trimStart() };
    }

                    function buildFrontmatter(data, body) {
      let yaml = '---\n';
      for (const [k, v] of Object.entries(data)) {
        if (Array.isArray(v)) yaml += k + ': ' + JSON.stringify(v) + '\n';
        else if (/^\d{4}-\d{2}-\d{2}$/.test(v)) yaml += k + ': ' + v + '\n';
        else yaml += k + ': "' + String(v).replace(/"/g, '\\"') + '"\n';
      }
      yaml += '---\n\n';
      return yaml + body.trimStart();
    }

    async function deleteFile() {
      if (!currentFile) return;
      if (!currentFile.sha) {
        showStatus('新建的文章尚未保存到 GitHub', 'error');
        return;
      }
      var title = document.getElementById('editor-title') ? document.getElementById('editor-title').value.trim() : currentFile.path;
      if (!confirm('确定要删除「' + title + '」吗？\n\n此操作不可撤销！')) return;

      document.getElementById('btn-delete').disabled = true;
      document.getElementById('btn-delete').textContent = '删除中...';
      showStatus('正在删除...', 'loading');

      try {
        // 删除前重新获取最新 SHA（防止缓存过期导致 403）
        var latest = await gh('/contents/' + currentFile.path);
        currentFile.sha = latest.sha;
        await gh('/contents/' + currentFile.path, 'DELETE', {
          message: '删除: ' + title,
          sha: currentFile.sha,
          branch: BRANCH,
        });

        delete allFilesCache[currentFile.path];
        currentFile = null;
        document.getElementById('editor').innerHTML = '';
        document.getElementById('editor').classList.remove('active');
        document.getElementById('empty-state').style.display = 'flex';
        document.getElementById('btn-delete').style.display = 'none';
        showStatus('已删除', 'success');
        loadFiles();
      } catch (e) {
        // 403 = Token 无删除权限，改用本地隐藏
        if (e.status === 403) {
          var hidden = JSON.parse(localStorage.getItem('hidden_files') || '[]');
          hidden.push(currentFile.path);
          localStorage.setItem('hidden_files', JSON.stringify(hidden));
          delete allFilesCache[currentFile.path];
          currentFile = null;
          document.getElementById('editor').innerHTML = '';
          document.getElementById('editor').classList.remove('active');
          document.getElementById('empty-state').style.display = 'flex';
          document.getElementById('btn-delete').style.display = 'none';
          showStatus('已从列表隐藏（文件仍在 GitHub）', 'success');
          loadFiles();
          return;
        }
        // 404 = 文件已不存在，直接清理本地缓存
        if (e.status === 404) {
          delete allFilesCache[currentFile.path];
          currentFile = null;
          document.getElementById('editor').innerHTML = '';
          document.getElementById('editor').classList.remove('active');
          document.getElementById('empty-state').style.display = 'flex';
          document.getElementById('btn-delete').style.display = 'none';
          showStatus('已清理', 'success');
          loadFiles();
          return;
        }
        showStatus('删除失败: ' + e.message, 'error');
        document.getElementById('btn-delete').disabled = false;
        document.getElementById('btn-delete').textContent = '删除';
      }
    }


    // ===== Unhide =====
    function unhideAll() {
      localStorage.removeItem('hidden_files');
      showStatus('已恢复所有隐藏文件', 'success');
      loadFiles();
    }

    // ===== New File =====
    function newDiary() {
      const today = new Date().toISOString().split('T')[0];
      const content = '---\ntitle: "未命名"\ndate: ' + today + '\ntags: []\n---\n\n';
      const path = 'src/content/diary/' + today + '-untitled.md';

      currentFile = { path, sha: null, _content: content };
      allFilesCache[path] = { content: btoa(unescape(encodeURIComponent(content))) };
      renderEditor(content, path);
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('btn-delete').style.display = 'none';
    }

    function newGallery() {
      const today = new Date().toISOString().split('T')[0];
      const content = '---\ntitle: "未命名相册"\ndate: ' + today + '\nphotos: []\n---\n';
      const path = 'src/content/gallery/' + today + '-untitled.md';

      currentFile = { path, sha: null, _content: content };
      allFilesCache[path] = { content: btoa(unescape(encodeURIComponent(content))) };
      renderEditor(content, path);
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('btn-delete').style.display = 'none';
    }

    // ===== Utils =====
    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escapeAttr(s) {
      return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
