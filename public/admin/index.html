<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理</title>
  <style>
    :root {
      --bg: #fef9f4;
      --card: #fff;
      --border: #f0e4da;
      --text: #3d2c2c;
      --text2: #8b6f6f;
      --accent: #f0846c;
      --accent-h: #e06850;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    input, textarea, select, button { font-family: inherit; }

    /* ===== Login ===== */
    #login-screen {
      max-width: 420px;
      margin: 120px auto;
      padding: 40px 32px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
      text-align: center;
    }
    #login-screen h1 { font-size: 1.5rem; margin-bottom: 6px; }
    #login-screen p { color: var(--text2); font-size: 0.9rem; margin-bottom: 24px; }
    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.2s;
    }
    #login-screen input:focus { border-color: var(--accent); }
    #login-screen .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #login-screen .btn:hover { background: var(--accent-h); }
    #login-screen .hint { font-size: 0.8rem; color: var(--text2); margin-top: 12px; }
    #login-screen .hint a { color: var(--accent); }

    /* ===== App ===== */
    #app { display: none; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .topbar h2 { font-size: 1.1rem; }
    .topbar-actions { display: flex; gap: 8px; }
    .topbar-actions button {
      padding: 6px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .topbar-actions button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .topbar-actions .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .topbar-actions .btn-primary:hover {
      background: var(--accent-h);
      color: #fff;
    }

    /* ===== Dashboard ===== */
    .dashboard { display: flex; min-height: calc(100vh - 60px); }
    .sidebar {
      width: 260px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      flex-shrink: 0;
    }
    .sidebar-section { padding: 8px 0; }
    .sidebar-section h3 {
      padding: 6px 20px;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text2);
      letter-spacing: 0.5px;
    }
    .sidebar-item {
      padding: 8px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: var(--bg); }
    .sidebar-item.active {
      background: var(--bg);
      border-left-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .sidebar-item .badge {
      font-size: 0.75rem;
      color: var(--text2);
    }

    /* ===== Editor ===== */
    .editor {
      flex: 1;
      padding: 24px;
      display: none;
      flex-direction: column;
      max-width: 900px;
    }
    .editor.active { display: flex; }
    .editor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .editor-header .title-input {
      font-size: 1.3rem;
      font-weight: 700;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      padding: 4px 0;
      flex: 1;
      min-width: 200px;
    }
    .editor-header .title-input::placeholder { color: var(--text2); opacity: 0.5; }
    .editor-actions { display: flex; gap: 8px; }
    .editor-actions button {
      padding: 8px 20px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .editor-actions button:hover { border-color: var(--accent); }
    .editor-actions .btn-save {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .editor-actions .btn-save:hover { background: var(--accent-h); }
    .editor-actions .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== Meta fields ===== */
    .meta-fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 8px;
      margin-bottom: 16px;
      padding: 16px;
      background: var(--card);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .meta-field { display: flex; flex-direction: column; gap: 4px; }
    .meta-field label {
      font-size: 0.78rem;
      color: var(--text2);
      font-weight: 600;
    }
    .meta-field input, .meta-field select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      background: var(--bg);
    }
    .meta-field input:focus, .meta-field select:focus { border-color: var(--accent); }

    /* ===== Content textarea ===== */
    .content-wrap {
      flex: 1;
      display: flex;
      gap: 16px;
      min-height: 400px;
    }
    .content-wrap textarea {
      flex: 1;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.92rem;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      background: var(--card);
      color: var(--text);
      font-family: 'Fira Code', 'Consolas', monospace;
      min-height: 400px;
    }
    .content-wrap textarea:focus { border-color: var(--accent); }

    /* ===== Preview ===== */
    .content-wrap .preview {
      flex: 1;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      overflow-y: auto;
      line-height: 1.8;
      font-size: 0.92rem;
    }
    .content-wrap .preview h1 { font-size: 1.4rem; margin: 0.8em 0 0.3em; }
    .content-wrap .preview h2 { font-size: 1.2rem; margin: 0.8em 0 0.3em; }
    .content-wrap .preview code {
      background: var(--bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .content-wrap .preview pre code { background: none; padding: 0; }
    .content-wrap .preview blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text2);
      margin: 0.5em 0;
    }

    /* ===== Status ===== */
    #status {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      z-index: 999;
    }
    #status.success { display: block; background: #d4edda; color: #155724; }
    #status.error { display: block; background: #f8d7da; color: #721c24; }
    #status.loading { display: block; background: #cce5ff; color: #004085; }

    /* ===== Empty ===== */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      gap: 8px;
    }
    .empty-state h3 { font-size: 1.2rem; }
    .empty-state p { font-size: 0.9rem; }

    /* ===== Loading ===== */
    .loading { text-align: center; padding: 40px; color: var(--text2); }
  </style>
</head>
<body>

  <!-- ===== Login Screen ===== -->
  <div id="login-screen">
    <h1>登录后台</h1>
    <input type="text" id="login-user" placeholder="用户名" autocomplete="username" />
    <input type="password" id="login-pass" placeholder="密码" autocomplete="current-password" />
    <p id="login-error" style="color:#d32f2f;display:none;margin-bottom:12px;font-size:0.85rem;"></p>
    <button class="btn" onclick="login()">登录</button>
    <div class="hint">默认账号: admin / 密码: admin123</div>
  </div>

  <!-- ===== Admin App ===== -->
  <div id="app">
    <div class="topbar">
      <h2>📝 后台管理</h2>
      <div class="topbar-actions">
        <button onclick="newDiary()">+ 写日记</button>
        <button onclick="newGallery()">+ 新建相册</button>
        <button onclick="deleteFile()" id="btn-delete" style="color:#d32f2f;border-color:#d32f2f;display:none;">删除</button>
        <button onclick="logout()">退出</button>
      </div>
    </div>
    <div class="dashboard">
      <div class="sidebar" id="sidebar"></div>
      <div class="editor" id="editor"></div>
      <div class="empty-state" id="empty-state">
        <h3>欢迎回来 👋</h3>
        <p>从左侧选择一篇文章编辑，或点击「写日记」新建</p>
      </div>
    </div>
  </div>

  <div id="status"></div>

  <script>
    const REPO = 'Mr-Lu-06/blog';
    const BRANCH = 'main';

    // ===== 登录密码（在这里修改）=====
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'admin123';

    let token = '';
    let files = [];
    let currentFile = null;

    // ===== Auth =====
    if (localStorage.getItem('admin_logged_in')) { showApp(); loadFiles(); }

    function login() {
      var u = document.getElementById('login-user').value.trim();
      var p = document.getElementById('login-pass').value.trim();
      var err = document.getElementById('login-error');

      if (u !== ADMIN_USER || p !== ADMIN_PASS) {
        err.textContent = '用户名或密码错误';
        err.style.display = 'block';
        return;
      }

      token = localStorage.getItem('gh_token');
      if (!token) {
        token = prompt('首次使用需要 GitHub Token：\n\n1. 打开 https://github.com/settings/tokens/new?scopes=repo&description=blog-admin\n2. 拉到页面底部点击「Generate token」\n3. 复制 token 粘贴到此处\n\n（仅需设置一次，之后自动记住）');
        if (!token) return;
        localStorage.setItem('gh_token', token);
      }

      localStorage.setItem('admin_logged_in', '1');
      showApp();
      loadFiles();
    }

    function logout() {
      localStorage.removeItem('admin_logged_in');
      location.reload();
    }

    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    // ===== GitHub API =====
    async function gh(path, method = 'GET', body = null) {
      const opts = {
        method,
        headers: {
          Authorization: 'Bearer ' + token,
          Accept: 'application/vnd.github.v3+json',
        },
      };
      if (body) {
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      }
      const url = 'https://api.github.com/repos/' + REPO + path;
      const res = await fetch(url, opts);
      if (!res.ok) {
        const errText = await res.text().catch(() => '');
        var err = new Error(res.status + ': ' + (errText.length > 100 ? errText.substring(0, 100) : errText));
        err.status = res.status;
        throw err;
      }
      return method === 'GET' ? res.json() : res;
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
      clearTimeout(el._timer);
      if (type !== 'loading') el._timer = setTimeout(() => el.style.display = 'none', 3000);
    }

    // ===== Load Files =====
    async function safeGh(path) {
      try { return await gh(path); }
      catch (e) { if (e.status === 404) return []; else throw e; }
    }

    async function loadFiles() {
      showStatus('加载中...', 'loading');
      try {
        const diaryFiles = await safeGh('/contents/src/content/diary');
        const galleryFiles = await safeGh('/contents/src/content/gallery');

        files = [
          ...(Array.isArray(diaryFiles) ? diaryFiles.map(f => ({ ...f, _type: 'diary' })) : []),
          ...(Array.isArray(galleryFiles) ? galleryFiles.map(f => ({ ...f, _type: 'gallery' })) : []),
        ];

        renderSidebar();
        showStatus('加载完成', 'success');
      } catch (e) {
        var msg = e.message;
        if (e.status === 401) {
          localStorage.removeItem('gh_token');
          localStorage.removeItem('admin_logged_in');
          token = '';
          alert('GitHub Token 无效，请重新设置。\n\n1. 打开 https://github.com/settings/tokens/new?scopes=repo&description=blog-admin\n2. 生成新 Token 后重新登录');
          location.reload();
          return;
        }
        showStatus('加载失败: ' + msg, 'error');
      }
    }

    // ===== Render Sidebar =====
    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      const diaries = files.filter(f => f._type === 'diary');
      const galleries = files.filter(f => f._type === 'gallery');

      let html = '';
      html += '<div class="sidebar-section"><h3>日记</h3>';
      diaries.forEach(f => {
        const name = f.name.replace(/\.md$/, '').replace(/\d{4}-\d{2}-\d{2}-/, '');
        const active = currentFile && currentFile.path === f.path ? 'active' : '';
        html += '<div class="sidebar-item ' + active + '" onclick="openFile(\'' + f.path + '\')">' +
          '<span>' + escapeHtml(name) + '</span></div>';
      });
      if (!diaries.length) html += '<div class="sidebar-item" style="color:var(--text2);font-style:italic;">暂无日记</div>';

      html += '</div><div class="sidebar-section"><h3>相册</h3>';
      galleries.forEach(f => {
        const name = f.name.replace(/\.md$/, '');
        const active = currentFile && currentFile.path === f.path ? 'active' : '';
        html += '<div class="sidebar-item ' + active + '" onclick="openFile(\'' + f.path + '\')">' +
          '<span>' + escapeHtml(name) + '</span></div>';
      });
      if (!galleries.length) html += '<div class="sidebar-item" style="color:var(--text2);font-style:italic;">暂无相册</div>';

      html += '</div>';
      sidebar.innerHTML = html;
    }

    // ===== Open File =====
    let allFilesCache = {};

    async function openFile(path) {
      showStatus('加载中...', 'loading');
      try {
        if (!allFilesCache[path]) {
          const data = await gh('/contents/' + path);
          allFilesCache[path] = data;
        }
        const data = allFilesCache[path];
        const content = decodeURIComponent(escape(atob(data.content)));
        currentFile = { ...data, _content: content, path };
        renderEditor(content, path);
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('btn-delete').style.display = 'inline-block';
        renderSidebar();
        showStatus('已加载', 'success');
      } catch (e) {
        showStatus('打开失败: ' + e.message, 'error');
      }
    }

    // ===== Parse & Render Editor =====
    function parseFrontmatter(content) {
      const match = content.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
      if (!match) return { data: {}, body: content };
      const yaml = match[1];
      const body = match[2];
      const data = {};
      yaml.split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx > 0) {
          let key = line.substring(0, idx).trim();
          let val = line.substring(idx + 1).trim();
          if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
          if (val.startsWith('[') && val.endsWith(']')) {
            try { val = JSON.parse(val); } catch {}
          }
          data[key] = val;
        }
      });
      return { data, body: body.trimStart() };
    }

    function buildFrontmatter(data, body) {
      let yaml = '---\n';
      for (const [k, v] of Object.entries(data)) {
        if (Array.isArray(v)) yaml += k + ': ' + JSON.stringify(v) + '\n';
        else yaml += k + ': "' + String(v).replace(/"/g, '\\"') + '"\n';
      }
      yaml += '---\n\n';
      return yaml + body.trimStart();
    }

    function renderEditor(content, path) {
      const parsed = parseFrontmatter(content);
      const isDiary = path.startsWith('src/content/diary');

      let metaHtml = '';
      if (isDiary) {
        metaHtml = `
          <div class="meta-field"><label>标题</label><input id="fm-title" value="${escapeAttr(parsed.data.title || '')}" placeholder="文章标题" /></div>
          <div class="meta-field"><label>日期</label><input id="fm-date" type="date" value="${escapeAttr(parsed.data.date || '')}" /></div>
          <div class="meta-field"><label>心情</label>
            <select id="fm-mood"><option value="">--</option><option>开心</option><option>平静</option><option>期待</option><option>感动</option><option>疲惫</option><option>郁闷</option></select>
          </div>
          <div class="meta-field"><label>天气</label>
            <select id="fm-weather"><option value="">--</option><option>晴天</option><option>多云</option><option>阴天</option><option>小雨</option><option>大雨</option><option>雪天</option></select>
          </div>
          <div class="meta-field"><label>标签（逗号分隔）</label><input id="fm-tags" value="${escapeAttr(Array.isArray(parsed.data.tags) ? parsed.data.tags.join(', ') : parsed.data.tags || '')}" placeholder="日常, 旅行" /></div>
          <div class="meta-field"><label>头图路径</label><input id="fm-image" value="${escapeAttr(parsed.data.featured_image || '')}" placeholder="/images/xxx.jpg" /></div>
        `;
      } else {
        metaHtml = `
          <div class="meta-field"><label>标题</label><input id="fm-title" value="${escapeAttr(parsed.data.title || '')}" /></div>
          <div class="meta-field"><label>日期</label><input id="fm-date" type="date" value="${escapeAttr(parsed.data.date || '')}" /></div>
        `;
      }

      const editorHtml = `
        <div class="editor-header">
          <input class="title-input" id="editor-title" value="${escapeAttr(parsed.data.title || '')}" placeholder="标题" />
          <div class="editor-actions">
            <button onclick="togglePreview()">预览</button>
            <button class="btn-save" id="btn-save" onclick="saveFile()">保存</button>
          </div>
        </div>
        <div class="meta-fields">${metaHtml}</div>
        <div class="content-wrap">
          <textarea id="editor-body" placeholder="正文（Markdown）">${escapeHtml(parsed.body)}</textarea>
          <div class="preview" id="preview-panel" style="display:none;"></div>
        </div>
      `;

      document.getElementById('editor').innerHTML = editorHtml;
      document.getElementById('editor').classList.add('active');

      // Set select values
      if (isDiary) {
        if (parsed.data.mood) document.getElementById('fm-mood').value = parsed.data.mood;
        if (parsed.data.weather) document.getElementById('fm-weather').value = parsed.data.weather;
      }

      // Live preview
      document.getElementById('editor-body').addEventListener('input', updatePreview);
      updatePreview();
    }

    function updatePreview() {
      const body = document.getElementById('editor-body').value;
      const preview = document.getElementById('preview-panel');
      if (preview.style.display !== 'none') {
        preview.innerHTML = simpleMarkdown(body);
      }
    }

    let previewVisible = false;
    function togglePreview() {
      const preview = document.getElementById('preview-panel');
      previewVisible = !previewVisible;
      preview.style.display = previewVisible ? 'block' : 'none';
      if (previewVisible) updatePreview();
    }

    // ===== Simple Markdown =====
    function simpleMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .split('\n\n').map(p => p.trim() ? '<p>' + p.replace(/\n/g, '<br/>') + '</p>' : '').join('\n');
    }

    // ===== Save File =====
    async function saveFile() {
      if (!currentFile) return;

      const title = document.getElementById('editor-title').value.trim();
      const body = document.getElementById('editor-body').value;
      const isDiary = currentFile.path.startsWith('src/content/diary');

      const data = { title };

      if (isDiary) {
        data.date = document.getElementById('fm-date').value;
        data.tags = document.getElementById('fm-tags').value.split(/[,，\s]+/).filter(Boolean);
        const mood = document.getElementById('fm-mood').value;
        if (mood) data.mood = mood;
        const weather = document.getElementById('fm-weather').value;
        if (weather) data.weather = weather;
        const image = document.getElementById('fm-image').value.trim();
        if (image) data.featured_image = image;
      } else {
        data.date = document.getElementById('fm-date').value;
      }

      const newContent = buildFrontmatter(data, body);

      document.getElementById('btn-save').disabled = true;
      document.getElementById('btn-save').textContent = '保存中...';
      showStatus('正在保存...', 'loading');

      try {
        var saveData = {
          message: '更新: ' + title,
          content: btoa(unescape(encodeURIComponent(newContent))),
          branch: BRANCH,
        };
        if (currentFile.sha) saveData.sha = currentFile.sha;
        await gh('/contents/' + currentFile.path, 'PUT', saveData);

        // Clear cache for this file
        delete allFilesCache[currentFile.path];
        // 重新获取文件信息以更新 sha
        var newData = await gh('/contents/' + currentFile.path);
        currentFile.sha = newData.sha;
        document.getElementById('btn-delete').style.display = 'inline-block';
        showStatus('保存成功！Netlify 自动部署中...', 'success');
        document.getElementById('btn-save').textContent = '已保存 ✓';
        setTimeout(() => {
          document.getElementById('btn-save').disabled = false;
          document.getElementById('btn-save').textContent = '保存';
        }, 2000);
      } catch (e) {
        showStatus('保存失败: ' + e.message, 'error');
        document.getElementById('btn-save').disabled = false;
        document.getElementById('btn-save').textContent = '保存';
      }
    }

    // ===== Delete File =====
    async function deleteFile() {
      if (!currentFile) return;
      if (!currentFile.sha) {
        showStatus('新建的文章尚未保存到 GitHub', 'error');
        return;
      }
      var title = document.getElementById('editor-title') ? document.getElementById('editor-title').value.trim() : currentFile.path;
      if (!confirm('确定要删除「' + title + '」吗？\n\n此操作不可撤销！')) return;

      document.getElementById('btn-delete').disabled = true;
      document.getElementById('btn-delete').textContent = '删除中...';
      showStatus('正在删除...', 'loading');

      try {
        await gh('/contents/' + currentFile.path, 'DELETE', {
          message: '删除: ' + title,
          sha: currentFile.sha,
          branch: BRANCH,
        });

        delete allFilesCache[currentFile.path];
        currentFile = null;
        document.getElementById('editor').innerHTML = '';
        document.getElementById('editor').classList.remove('active');
        document.getElementById('empty-state').style.display = 'flex';
        document.getElementById('btn-delete').style.display = 'none';
        showStatus('已删除', 'success');
        loadFiles();
      } catch (e) {
        showStatus('删除失败: ' + e.message, 'error');
        document.getElementById('btn-delete').disabled = false;
        document.getElementById('btn-delete').textContent = '删除';
      }
    }

    // ===== New File =====
    function newDiary() {
      const today = new Date().toISOString().split('T')[0];
      const content = '---\ntitle: "未命名"\ndate: ' + today + '\ntags: []\n---\n\n';
      const path = 'src/content/diary/' + today + '-untitled.md';

      currentFile = { path, sha: null, _content: content };
      allFilesCache[path] = { content: btoa(unescape(encodeURIComponent(content))) };
      renderEditor(content, path);
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('btn-delete').style.display = 'none';
    }

    function newGallery() {
      const today = new Date().toISOString().split('T')[0];
      const content = '---\ntitle: "未命名相册"\ndate: ' + today + '\nphotos: []\n---\n';
      const path = 'src/content/gallery/' + today + '-untitled.md';

      currentFile = { path, sha: null, _content: content };
      allFilesCache[path] = { content: btoa(unescape(encodeURIComponent(content))) };
      renderEditor(content, path);
      document.getElementById('empty-state').style.display = 'none';
      document.getElementById('btn-delete').style.display = 'none';
    }

    // ===== Utils =====
    function escapeHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escapeAttr(s) {
      return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
